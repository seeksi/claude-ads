  <title>Claude Ads — Paid Advertising Audit Skill for Claude Code</title>
  <desc>Animated terminal-style banner. 21:9, warm-orange CRT phosphor palette. Live command palette with scanning highlight, breathing gradient on the logo, drift scanline, and pulsing status indicators.</desc>
  <defs>
