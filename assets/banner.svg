      <stop offset="50%" stop-color="#D97757" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D97757" stop-opacity="0"/>
    </linearGradient>
    <pattern id="scanlines" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="2" fill="transparent"/>
      <rect y="2" width="3" height="1" fill="#000" fill-opacity="0.22"/>
    </pattern>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.18  0 0 0 0 0.17  0 0 0 0 0.15  0 0 0 0.30 0"/>
    </filter>
  </defs>
