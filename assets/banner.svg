    <linearGradient id="dividerGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="50%" stop-color="#E89270"/>
      <stop offset="100%" stop-color="#D97757"/>
